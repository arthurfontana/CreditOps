{% extends "base.html" %}
{% block title %}Tags — {{ app_name }}{% endblock %}
{% block content %}
<div class="breadcrumbs">Administração → Tags</div>
<h1>Tags</h1>
<div class="grid2">
  <div class="card">
    <ul>{% for tag in tags %}<li>{{ tag.name }}</li>{% else %}<li class="help">Nenhuma tag.</li>{% endfor %}</ul>
  </div>
  <div class="card">
    <h2>Nova tag</h2>
    <form class="stack" method="post" action="/admin/tags">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <label for="name">Nome</label>
      <input type="text" id="name" name="name" required>
      <div class="actions"><button type="submit">Criar</button></div>
    </form>
  </div>
</div>
{% endblock %}
