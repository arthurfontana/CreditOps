{% extends "base.html" %}
{% block title %}Trocar senha — {{ app_name }}{% endblock %}
{% block content %}
<div class="card login-box">
  <h1>Trocar senha</h1>
  {% if user.must_change_password %}<div class="banner">Sua senha é temporária — defina uma nova para continuar.</div>{% endif %}
  {% if msg %}<div class="flash flash-error">{{ msg }}</div>{% endif %}
  <form class="stack" method="post" action="/change-password">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label for="current_password">Senha atual</label>
    <input type="password" id="current_password" name="current_password" required>
    <label for="new_password">Nova senha (mín. 8 caracteres)</label>
    <input type="password" id="new_password" name="new_password" required minlength="8">
    <div class="actions"><button type="submit">Salvar</button></div>
  </form>
</div>
{% endblock %}
